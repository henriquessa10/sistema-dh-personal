<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DH PT - Sistema de Gestão</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <style>
        :root { --verde-oliva: #556b2f; --preto: #1a1a1a; --branco: #ffffff; --cinza: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--preto); color: var(--branco); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .tela { display: none; padding: 20px; box-sizing: border-box; }
        .tela.ativa { display: block; }
        header { text-align: center; padding: 20px; }
        .logo-container img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--verde-oliva); object-fit: cover; }
        h1 { font-size: 1.3rem; letter-spacing: 1px; margin: 10px 0; color: var(--verde-oliva); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background-color: var(--cinza); border: 2px solid var(--verde-oliva); border-radius: 12px; padding: 20px; text-align: center; color: white; text-decoration: none; font-weight: bold; cursor: pointer; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--verde-oliva); background: #222; color: white; box-sizing: border-box; }
        .btn { background-color: var(--verde-oliva); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-voltar { background-color: #555; margin-top: 20px; }
        .aluno-card { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--verde-oliva); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="home" class="tela ativa">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Logo DH PT">
            </div>
            <h1>Dionisio Henrique Personal Trainer</h1>
        </header>
        <div class="menu-grid">
            <div class="menu-item" onclick="irPara('cadastro')">📝 Cadastro</div>
            <div class="menu-item" onclick="irPara('anamnese')">📋 Anamnese</div>
            <div class="menu-item" onclick="irPara('lista')">👥 Meus Alunos</div>
            <div class="menu-item" onclick="irPara('treinos')">💪 Treinos</div>
        </div>
    </div>

    <div id="cadastro" class="tela">
        <h2>Novo Aluno</h2>
        <input type="text" id="nomeA" placeholder="Nome Completo">
        <button class="btn" onclick="salvarA()">Gravar Aluno</button>
        <button class="btn btn-voltar" onclick="irPara('home')">Voltar</button>
    </div>

    <div id="lista" class="tela">
        <h2>Meus Alunos</h2>
        <div id="contAlunos"></div>
        <button class="btn btn-voltar" onclick="irPara('home')">Voltar</button>
    </div>

    <script>
        function irPara(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
            if(id === 'lista') carregarA();
        }

        function salvarA() {
            let nome = document.getElementById('nomeA').value;
            if(!nome) return alert("Digite o nome");
            let alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
            alunos.push({nome: nome, id: Date.now()});
            localStorage.setItem('alunos', JSON.stringify(alunos));
            alert("Aluno Salvo!");
            document.getElementById('nomeA').value = '';
            irPara('home');
        }

        function carregarA() {
            let alunos = JSON.parse(localStorage.getItem('alunos') || '[]');
            document.getElementById('contAlunos').innerHTML = alunos.map(a => `
                <div class="aluno-card">${a.nome} <span>➔</span></div>
            `).join('');
        }
    </script>
</body>
</html>
