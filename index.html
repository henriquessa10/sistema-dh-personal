<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DH PT - Gestão Completa</title>
    <style>
        :root { --verde: #556b2f; --fundo: #0a0a0a; --card: #141414; --texto: #e0e0e0; --input: #1f1f1f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 120px; overflow-x: hidden; width: 100vw; }
        
        header { padding: 25px 15px; background: linear-gradient(180deg, #1a1a1a 0%, var(--fundo) 100%); border-bottom: 1px solid #222; position: relative; }
        .logo-css { width: 80px; height: 80px; background: #000; border-radius: 50%; border: 2px solid var(--verde); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Arial Black'; font-size: 1.6rem; color: #fff; line-height: 0.9; margin-bottom: 12px; text-align: center; }
        .sessao-ativa { position: absolute; top: 25px; right: 15px; color: var(--verde); font-size: 0.65rem; text-transform: uppercase; font-weight: bold; }
        
        .nav-tabs { display: flex; gap: 8px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 10px 20px; border-radius: 20px; background: transparent; color: #fff; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: 1px solid #333; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
        .tab.ativa { background: var(--verde); border-color: var(--verde); }

        .tela { display: none; padding: 0 15px; }
        .ativa-tela { display: block; }

        .section-title { font-size: 1rem; color: #fff; margin: 20px 0 5px 0; text-transform: uppercase; font-weight: bold; }
        .section-desc { font-size: 0.7rem; opacity: 0.6; margin-bottom: 20px; }
        
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 5px; }
        input, select, textarea { width: 100%; background: var(--input); border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; font-size: 0.9rem; box-sizing: border-box; }
        
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; margin-top: 5px; }
        .radio-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #fff; cursor: pointer; }
        
        /* Planilha de Treino Mobile */
        .header-treino { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; text-align: center; }
        .header-treino span { font-size: 0.6rem; color: var(--verde); font-weight: bold; text-transform: uppercase; }
        .linha-treino { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        .linha-treino input { padding: 10px 4px; font-size: 0.8rem; text-align: center; }

        .btn-salvar { background: var(--verde); color: #fff; border: none; padding: 16px; border-radius: 25px; width: 100%; font-weight: bold; text-transform: uppercase; margin-top: 25px; letter-spacing: 1px; }
        .btn-add { background: #1a1a1a; color: var(--verde); border: 1px dashed var(--verde); padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        
        .aluno-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--verde); display: flex; justify-content: space-between; align-items: center; }

        .footer-status { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 12px 15px; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; z-index: 100; }
        .avatar-mini { width: 45px; height: 45px; background: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <div class="sessao-ativa">Ativo</div>
        <div class="logo-css"><div>DH</div><div>PT</div></div>
        <h1>Dionisio Henrique</h1>
    </header>

    <nav class="nav-tabs">
        <div class="tab ativa" onclick="mudarTela('cadastro', this)">Cadastro</div>
        <div class="tab" onclick="mudarTela('anamnese', this)">Anamnese</div>
        <div class="tab" onclick="mudarTela('treino', this)">Treino</div>
        <div class="tab" onclick="mudarTela('lista', this)">Meus Alunos</div>
    </nav>

    <div id="cadastro" class="tela ativa-tela">
        <div class="section-title">Cadastro do Aluno</div>
        <div class="grid-form">
            <div class="full-width"><label>Nome completo</label><input type="text" id="nome"></div>
            <div><label>Nascimento</label><input type="date" id="nasc"></div>
            <div><label>Sexo</label><select id="sexo"><option value="">Selecionar</option><option>Masculino</option><option>Feminino</option></select></div>
            <div><label>WhatsApp</label><input type="text" id="tel"></div>
            <div><label>E-mail</label><input type="email" id="email"></div>
            <div><label>Peso (kg)</label><input type="number" id="peso"></div>
            <div><label>Altura (cm)</label><input type="number" id="altura"></div>
            <div class="full-width"><label>Objetivo</label><select id="objetivo"><option>Emagrecimento</option><option>Hipertrofia</option><option>Definição</option><option>Saúde</option></select></div>
            <div class="full-width"><label>Observações</label><textarea id="obs" rows="3"></textarea></div>
        </div>
        <button class="btn-salvar" onclick="salvarGeral()">Salvar Cadastro</button>
    </div>

    <div id="anamnese" class="tela">
        <div class="section-title">Anamnese</div>
        <label>Possui liberação médica?</label>
        <div class="radio-group">
            <label class="radio-item"><input type="radio" name="lib" id="libSim" value="Sim"> Sim</label>
            <label class="radio-item"><input type="radio" name="lib" id="libNao" value="Não"> Não</label>
        </div>
        <label>Usa medicação contínua?</label>
        <div class="radio-group">
            <label class="radio-item"><input type="radio" name="rem" id="remSim" value="Sim"> Sim</label>
            <label class="radio-item"><input type="radio" name="rem" id="remNao" value="Não"> Não</label>
        </div>
        <div class="grid-form">
            <div class="full-width"><label>Histórico de Doenças</label><textarea id="doencas" rows="2"></textarea></div>
            <div class="full-width"><label>Histórico de Lesões</label><textarea id="lesoes" rows="2"></textarea></div>
        </div>
        <label style="margin-top:15px">Fatores de Risco</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <label class="radio-item"><input type="checkbox" class="risco" value="Sedentário"> Sedentário</label>
            <label class="radio-item"><input type="checkbox" class="risco" value="Fumante"> Fumante</label>
            <label class="radio-item"><input type="checkbox" class="risco" value="Álcool"> Álcool</label>
            <label class="radio-item"><input type="checkbox" class="risco" value="Diabetes"> Diabetes</label>
        </div>
        <button class="btn-salvar" onclick="salvarGeral()">Salvar Anamnese</button>
    </div>

    <div id="treino" class="tela">
        <div class="section-title">Planilha de Treino</div>
        <div class="header-treino"><span>Exercício</span><span>S</span><span>R</span><span>Kg</span></div>
        <div id="cont-ex">
            <div class="linha-treino"><input type="text" class="ex"><input type="text" class="s"><input type="text" class="r"><input type="text" class="k"></div>
        </div>
        <button class="btn-add" onclick="addLinha()">+ Exercício</button>
        <button class="btn-salvar" onclick="salvarGeral()">Salvar Treino</button>
    </div>

    <div id="lista" class="tela">
        <div class="section-title">Alunos Salvos</div>
        <div id="lista-alunos"></div>
    </div>

    <div class="footer-status">
        <div class="avatar-mini" id="av">DH</div>
        <div>
            <div style="font-size: 0.85rem; font-weight: bold;" id="sn">Nenhum Selecionado</div>
            <div style="font-size: 0.7rem; opacity: 0.6;" id="sm">Aguardando dados...</div>
        </div>
    </div>

    <script>
        let alunoAtivoId = null;

        function mudarTela(id, el) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa-tela'));
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa-tela');
            el.classList.add('ativa');
            if(id === 'lista') renderLista();
        }

        function addLinha(ex="", s="", r="", k="") {
            const div = document.createElement('div'); div.className = 'linha-treino';
            div.innerHTML = `<input type="text" class="ex" value="${ex}"><input type="text" class="s" value="${s}"><input type="text" class="r" value="${r}"><input type="text" class="k" value="${k}">`;
            document.getElementById('cont-ex').appendChild(div);
        }

        function salvarGeral() {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Por favor, digite o nome!");

            let alunos = JSON.parse(localStorage.getItem('dh_alunos') || '[]');
            
            // Coleta riscos
            const riscos = [];
            document.querySelectorAll('.risco:checked').forEach(c => riscos.push(c.value));

            // Coleta treino
            const treinoData = Array.from(document.querySelectorAll('.linha-treino')).map(l => ({
                ex: l.querySelector('.ex').value, s: l.querySelector('.s').value, r: l.querySelector('.r').value, k: l.querySelector('.k').value
            }));

            const dados = {
                id: alunoAtivoId || Date.now(),
                nome: nome, nasc: document.getElementById('nasc').value, sexo: document.getElementById('sexo').value,
                tel: document.getElementById('tel').value, email: document.getElementById('email').value,
                peso: document.getElementById('peso').value, altura: document.getElementById('altura').value,
                objetivo: document.getElementById('objetivo').value, obs: document.getElementById('obs').value,
                lib: document.querySelector('input[name="lib"]:checked')?.value || "",
                rem: document.querySelector('input[name="rem"]:checked')?.value || "",
                doencas: document.getElementById('doencas').value, lesoes: document.getElementById('lesoes').value,
                riscos: riscos, treino: treinoData
            };

            if(alunoAtivoId) { alunos = alunos.map(a => a.id === alunoAtivoId ? dados : a); } 
            else { alunos.push(dados); alunoAtivoId = dados.id; }

            localStorage.setItem('dh_alunos', JSON.stringify(alunos));
            atualizarRodape(nome);
            alert("Sincronizado com o dispositivo!");
        }

        function renderLista() {
            const lista = document.getElementById('lista-alunos');
            const alunos = JSON.parse(localStorage.getItem('dh_alunos') || '[]');
            if(alunos.length === 0) { lista.innerHTML = "<p style='opacity:0.5'>Nenhum aluno cadastrado.</p>"; return; }
            lista.innerHTML = alunos.map(a => `
                <div class="aluno-item" onclick="carregarAluno(${a.id})">
                    <div style="display:flex; flex-direction:column">
                        <span style="font-weight:bold">${a.nome}</span>
                        <small style="opacity:0.6">${a.objetivo} | ${a.peso}kg</small>
                    </div>
                    <span style="color:var(--verde)">➔</span>
                </div>
            `).join('');
        }

        function carregarAluno(id) {
            const alunos = JSON.parse(localStorage.getItem('dh_alunos') || '[]');
            const a = alunos.find(x => x.id === id);
            alunoAtivoId = a.id;
            
            // Cadastro
            document.getElementById('nome').value = a.nome;
            document.getElementById('nasc').value = a.nasc;
            document.getElementById('sexo').value = a.sexo;
            document.getElementById('tel').value = a.tel;
            document.getElementById('email').value = a.email;
            document.getElementById('peso').value = a.peso;
            document.getElementById('altura').value = a.altura;
            document.getElementById('objetivo').value = a.objetivo;
            document.getElementById('obs').value = a.obs;

            // Anamnese
            if(a.lib === "Sim") document.getElementById('libSim').checked = true; else if(a.lib === "Não") document.getElementById('libNao').checked = true;
            if(a.rem === "Sim") document.getElementById('remSim').checked = true; else if(a.rem === "Não") document.getElementById('remNao').checked = true;
            document.getElementById('doencas').value = a.doencas;
            document.getElementById('lesoes').value = a.lesoes;
            document.querySelectorAll('.risco').forEach(c => c.checked = a.riscos.includes(c.value));

            // Treino
            document.getElementById('cont-ex').innerHTML = '';
            if(a.treino && a.treino.length) a.treino.forEach(t => addLinha(t.ex, t.s, t.r, t.k));
            else addLinha();

            atualizarRodape(a.nome);
            mudarTela('cadastro', document.querySelectorAll('.tab')[0]);
        }

        function atualizarRodape(nome) {
            document.getElementById('sn').innerText = nome;
            document.getElementById('sm').innerText = "Sessão Ativa";
            document.getElementById('av').innerText = nome.substring(0,2).toUpperCase();
        }
    </script>
</body>
</html>
